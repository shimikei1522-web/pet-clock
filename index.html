<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#bcefed" />
    <title>Pepaatennko</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./assets/pet-reference.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Pepaatennko アプリ">
      <section class="stage" id="stage">
        <div class="sky"></div>
        <div class="clock-panel" aria-label="現在時刻">
          <span class="clock-label">TIME</span>
          <time id="clock" class="clock" datetime="">00:00:00</time>
          <time id="largeClockDisplay" class="large-clock-display" datetime="" aria-live="polite" hidden>00:00:00</time>
        </div>
        <div class="stage-timer" aria-label="集中タイマー残り時間">
          <span id="stageTimerLabel">FOCUS</span>
          <output id="stageTimerDisplay" aria-live="polite">05:00</output>
          <time id="currentDate" class="date-display" datetime="">5月17日（日）</time>
          <output id="largeTimerDisplay" class="large-stage-timer" aria-live="polite" hidden>05:00</output>
        </div>
        <div class="stage-quick-controls" aria-label="背景内クイック設定">
          <button id="stageThemeButton" class="stage-quick-button" type="button">🎨 背景</button>
          <button id="stageStyleButton" class="stage-quick-button" type="button">🐾 スタイル</button>
          <button id="stageSpeechButton" class="stage-quick-button" type="button">🔇 声OFF</button>
        </div>
        <p id="message" class="speech-bubble pet-bubble" aria-live="polite">クリックすると動きます</p>
        <p id="chefMessage" class="speech-bubble chef-bubble" aria-live="polite" hidden></p>
        <p id="animalMessage" class="speech-bubble animal-bubble" aria-live="polite" hidden></p>
        <div id="analogClock" class="analog-clock" role="img" aria-label="アナログ時計" hidden>
          <span class="analog-number analog-number-12">12</span>
          <span class="analog-number analog-number-3">3</span>
          <span class="analog-number analog-number-6">6</span>
          <span class="analog-number analog-number-9">9</span>
          <span class="analog-hand analog-hour"></span>
          <span class="analog-hand analog-minute"></span>
          <span class="analog-hand analog-second"></span>
          <span class="analog-center"></span>
        </div>
        <div class="friend" aria-hidden="true">
          <img class="friend-chef" src="./assets/chef-friend-standing.png.png" alt="" />
        </div>
        <div class="animal-friend" aria-hidden="true">
          <img class="animal-friend-image" src="./assets/animal-friend-transparent.png" alt="" />
        </div>
        <canvas id="pet" class="pet" width="240" height="320" aria-label="Pepaatennko"></canvas>
        <div class="shadow" aria-hidden="true"></div>
      </section>

      <section class="panel" aria-label="ペット操作">
        <img class="portrait" src="./assets/pet-reference.png" alt="Pepaatennko のポートレート" />
        <div>
          <p class="label">PET</p>
          <h1>Pepaatennko</h1>
        </div>
        <div class="pet-actions" aria-label="ペットメニュー">
          <button id="dailyQuoteButton" class="daily-quote-button" type="button">一言</button>
          <button id="luckyFortuneButton" class="daily-quote-button" type="button">占い</button>
          <button id="nameSettingsButton" class="daily-quote-button" type="button" aria-expanded="false" aria-controls="namePanel">名前設定</button>
          <button id="themeSettingsButton" class="daily-quote-button moved-to-stage" type="button" aria-expanded="false" aria-controls="themePanel">背景</button>
          <button id="anniversarySettingsButton" class="daily-quote-button" type="button" aria-expanded="false" aria-controls="anniversaryPanel">記念日設定</button>
          <button id="bgmSettingsButton" class="daily-quote-button" type="button" aria-expanded="false" aria-controls="bgmPanel">BGM</button>
          <button id="speechToggleButton" class="daily-quote-button moved-to-stage" type="button" aria-pressed="false">声OFF</button>
          <button id="voiceCommandButton" class="daily-quote-button" type="button" aria-pressed="false">マイク</button>
          <button id="vibrationToggleButton" class="daily-quote-button" type="button" aria-pressed="false">バイブOFF</button>
          <button id="petStyleToggleButton" class="daily-quote-button moved-to-stage" type="button" aria-pressed="false">スタイル</button>
          <button id="calculatorButton" class="daily-quote-button" type="button" aria-expanded="false" aria-controls="calculatorPanel">電卓</button>
        </div>
        <div id="namePanel" class="name-panel" hidden>
          <label for="userNameInput">呼んでほしい名前</label>
          <div class="name-row">
            <input id="userNameInput" type="text" maxlength="12" autocomplete="off" placeholder="名前" />
            <button id="saveNameButton" type="button">保存</button>
            <button id="clearNameButton" type="button">消す</button>
          </div>
        </div>
        <div id="themePanel" class="theme-panel" hidden>
          <span class="theme-panel-title">背景テーマ</span>
          <div class="theme-options" aria-label="背景テーマ">
            <button class="theme-choice active" type="button" data-theme="fresh">さわやか</button>
            <button class="theme-choice" type="button" data-theme="night">夜空</button>
            <button class="theme-choice" type="button" data-theme="forest">森</button>
            <button class="theme-choice" type="button" data-theme="cafe">カフェ</button>
            <button class="theme-choice" type="button" data-theme="season">季節</button>
          </div>
        </div>
        <div id="anniversaryPanel" class="anniversary-panel" hidden>
          <span class="anniversary-panel-title">誕生日・記念日</span>
          <div class="anniversary-grid">
            <label>
              <span>種類</span>
              <select id="anniversaryType">
                <option value="birthday">誕生日</option>
                <option value="anniversary1">記念日1</option>
                <option value="anniversary2">記念日2</option>
              </select>
            </label>
            <label>
              <span>月</span>
              <input id="anniversaryMonth" type="number" min="1" max="12" inputmode="numeric" placeholder="5" />
            </label>
            <label>
              <span>日</span>
              <input id="anniversaryDay" type="number" min="1" max="31" inputmode="numeric" placeholder="10" />
            </label>
            <label class="anniversary-name">
              <span>名前</span>
              <input id="anniversaryName" type="text" maxlength="18" placeholder="開店記念日" />
            </label>
            <label class="anniversary-memo">
              <span>メモ</span>
              <input id="anniversaryMemo" type="text" maxlength="32" placeholder="ベーカリーの記念日" />
            </label>
            <div class="anniversary-actions">
              <button id="saveAnniversaryButton" type="button">保存</button>
              <button id="clearAnniversaryButton" type="button">削除</button>
            </div>
          </div>
          <div id="anniversaryList" class="anniversary-list" aria-live="polite"></div>
        </div>
        <div id="bgmPanel" class="bgm-panel" hidden>
          <span class="bgm-panel-title">BGM設定</span>
          <button id="bgmToggle" class="bgm-toggle" type="button" aria-pressed="false">BGM再生</button>
          <label class="bgm-mode">
            <span>BGM</span>
            <select id="bgmMode" aria-label="BGM種類">
              <option value="off">オフ</option>
              <option value="gentle">やさしい</option>
              <option value="cafe">カフェ</option>
              <option value="focus">集中</option>
              <option value="night">夜</option>
            </select>
          </label>
          <label class="bgm-volume">
            <span>音量</span>
            <select id="bgmVolume" aria-label="BGM音量">
              <option value="0.04">小</option>
              <option value="0.08">中</option>
              <option value="0.13">大</option>
            </select>
          </label>
        </div>
        <div id="calculatorPanel" class="calculator-panel" hidden>
          <div class="calculator-header">
            <span class="calculator-title">電卓</span>
            <button id="calculatorCloseButton" class="calculator-close" type="button" aria-label="電卓を閉じる">閉じる</button>
          </div>
          <output id="calculatorDisplay" class="calculator-display" aria-live="polite">0</output>
          <div class="calculator-keys" aria-label="電卓キー">
            <button type="button" data-calc="clear">C</button>
            <button type="button" data-calc="backspace">⌫</button>
            <button type="button" data-calc="operator" data-operator="divide">÷</button>
            <button type="button" data-calc="operator" data-operator="multiply">×</button>
            <button type="button" data-calc="digit" data-value="7">7</button>
            <button type="button" data-calc="digit" data-value="8">8</button>
            <button type="button" data-calc="digit" data-value="9">9</button>
            <button type="button" data-calc="operator" data-operator="subtract">−</button>
            <button type="button" data-calc="digit" data-value="4">4</button>
            <button type="button" data-calc="digit" data-value="5">5</button>
            <button type="button" data-calc="digit" data-value="6">6</button>
            <button type="button" data-calc="operator" data-operator="add">＋</button>
            <button type="button" data-calc="digit" data-value="1">1</button>
            <button type="button" data-calc="digit" data-value="2">2</button>
            <button type="button" data-calc="digit" data-value="3">3</button>
            <button type="button" data-calc="equals" class="calculator-equals">＝</button>
            <button type="button" data-calc="digit" data-value="0" class="calculator-zero">0</button>
            <button type="button" data-calc="decimal">.</button>
          </div>
        </div>
        <div class="meters" aria-label="ペットの状態">
          <div class="meter">
            <span>きぶん</span>
            <strong id="mood">ごきげん</strong>
          </div>
          <div class="meter">
            <span>げんき</span>
            <strong id="energy">88</strong>
          </div>
        </div>
      </section>

      <section class="focus-panel" aria-label="集中タイマー">
        <div class="timer-card">
          <span class="panel-title timer-title">集中タイマー</span>
          <div class="timer-options" aria-label="タイマー時間">
            <button class="time-choice active" type="button" data-minutes="5">5分</button>
            <button class="time-choice" type="button" data-minutes="10">10分</button>
            <button class="time-choice" type="button" data-minutes="15">15分</button>
            <button class="time-choice" type="button" data-minutes="25">25分</button>
            <button class="time-choice" type="button" data-minutes="45">45分</button>
            <label class="custom-time">
              <span>カスタム</span>
              <input id="customMinutes" type="number" min="1" max="180" inputmode="numeric" placeholder="分" />
            </label>
          </div>

          <div class="timer-controls">
            <button id="startTimer" type="button">スタート</button>
            <button id="pauseTimer" type="button">一時停止</button>
            <button id="resetTimer" type="button">リセット</button>
            <button id="largeTimerToggle" class="large-timer-toggle" type="button" aria-pressed="false">大画面OFF</button>
          </div>
        </div>

        <div class="clock-settings-card">
          <span class="panel-title clock-settings-title">時計設定</span>
          <div class="clock-settings-controls" aria-label="時計表示設定">
            <button id="analogClockToggle" class="analog-clock-toggle" type="button" aria-pressed="false">アナログ時計にする</button>
            <button id="largeClockToggle" class="large-clock-toggle" type="button" aria-pressed="false">大画面時計OFF</button>
          </div>
        </div>

        <div class="clock-alarm-card">
          <span class="panel-title clock-alarm-label">時刻アラーム</span>
          <div class="clock-alarm-panel" aria-label="指定時刻アラーム">
            <label>
              <span>時</span>
              <select id="alarmHour" aria-label="アラームの時"></select>
            </label>
            <label>
              <span>分</span>
              <select id="alarmMinute" aria-label="アラームの分"></select>
            </label>
            <button id="clockAlarmToggle" class="clock-alarm-toggle" type="button" aria-pressed="false">時刻アラームOFF</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
