<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#bcefed" />
    <title>Pepaatennko</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./assets/pet-reference.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Pepaatennko アプリ">
      <section class="stage" id="stage">
        <div class="sky"></div>
        <div class="clock-panel" aria-label="現在時刻">
          <span class="clock-label">TIME</span>
          <time id="clock" class="clock" datetime="">00:00:00</time>
        </div>
        <div class="stage-timer" aria-label="集中タイマー残り時間">
          <span id="stageTimerLabel">FOCUS</span>
          <output id="stageTimerDisplay" aria-live="polite">05:00</output>
        </div>
        <img class="friend friend-chef" src="./assets/chef-friend-standing.png.png" alt="仲間キャラ パティシエ" />
        <canvas id="pet" class="pet" width="240" height="320" aria-label="Pepaatennko"></canvas>
        <div class="shadow" aria-hidden="true"></div>
      </section>

      <section class="panel" aria-label="ペット操作">
        <img class="portrait" src="./assets/pet-reference.png" alt="Pepaatennko のポートレート" />
        <div>
          <p class="label">PET</p>
          <h1>Pepaatennko</h1>
        </div>
        <div class="pet-actions" aria-label="ペットメニュー">
          <button id="dailyQuoteButton" class="daily-quote-button" type="button">今日のひとこと</button>
          <button id="luckyFortuneButton" class="daily-quote-button" type="button">ラッキー占い</button>
          <button id="nameSettingsButton" class="daily-quote-button" type="button" aria-expanded="false" aria-controls="namePanel">名前設定</button>
          <button id="themeSettingsButton" class="daily-quote-button" type="button" aria-expanded="false" aria-controls="themePanel">背景設定</button>
        </div>
        <div id="namePanel" class="name-panel" hidden>
          <label for="userNameInput">呼んでほしい名前</label>
          <div class="name-row">
            <input id="userNameInput" type="text" maxlength="12" autocomplete="off" placeholder="名前" />
            <button id="saveNameButton" type="button">保存</button>
            <button id="clearNameButton" type="button">消す</button>
          </div>
        </div>
        <div id="themePanel" class="theme-panel" hidden>
          <span class="theme-panel-title">背景テーマ</span>
          <div class="theme-options" aria-label="背景テーマ">
            <button class="theme-choice active" type="button" data-theme="fresh">さわやか</button>
            <button class="theme-choice" type="button" data-theme="night">夜空</button>
            <button class="theme-choice" type="button" data-theme="forest">森</button>
            <button class="theme-choice" type="button" data-theme="cafe">カフェ</button>
            <button class="theme-choice" type="button" data-theme="season">季節</button>
          </div>
        </div>
        <p id="message" class="message" aria-live="polite">クリックすると動きます</p>
        <div class="meters" aria-label="ペットの状態">
          <div class="meter">
            <span>きぶん</span>
            <strong id="mood">ごきげん</strong>
          </div>
          <div class="meter">
            <span>げんき</span>
            <strong id="energy">88</strong>
          </div>
        </div>
      </section>

      <section class="focus-panel" aria-label="集中タイマー">
        <div class="timer-options" aria-label="タイマー時間">
          <button class="time-choice active" type="button" data-minutes="5">5分</button>
          <button class="time-choice" type="button" data-minutes="10">10分</button>
          <button class="time-choice" type="button" data-minutes="15">15分</button>
          <button class="time-choice" type="button" data-minutes="25">25分</button>
          <button class="time-choice" type="button" data-minutes="45">45分</button>
          <label class="custom-time">
            <span>カスタム</span>
            <input id="customMinutes" type="number" min="1" max="180" inputmode="numeric" placeholder="分" />
          </label>
        </div>

        <div class="timer-controls">
          <button id="startTimer" type="button">スタート</button>
          <button id="pauseTimer" type="button">一時停止</button>
          <button id="resetTimer" type="button">リセット</button>
          <button id="alarmToggle" class="alarm-toggle active" type="button" aria-pressed="true">アラームON</button>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
