<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#bcefed" />
    <title>Pepaatennko</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./assets/pet-reference.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Pepaatennko アプリ">
      <section class="stage" id="stage">
        <div class="sky"></div>
        <div class="clock-panel" aria-label="現在時刻">
          <span class="clock-label">TIME</span>
          <time id="clock" class="clock" datetime="">00:00:00</time>
        </div>
        <canvas id="pet" class="pet" width="240" height="320" aria-label="Pepaatennko"></canvas>
        <div class="shadow" aria-hidden="true"></div>
      </section>

      <section class="panel" aria-label="ペット操作">
        <img class="portrait" src="./assets/pet-reference.png" alt="Pepaatennko のポートレート" />
        <div>
          <p class="label">PET</p>
          <h1>Pepaatennko</h1>
        </div>
        <p id="message" class="message" aria-live="polite">クリックすると動きます</p>
        <div class="meters" aria-label="ペットの状態">
          <div class="meter">
            <span>ごきげん</span>
            <strong id="mood">72</strong>
          </div>
          <div class="meter">
            <span>げんき</span>
            <strong id="energy">88</strong>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
